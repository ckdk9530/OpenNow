<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">OpenNow render test diagram</title>
  <desc id="desc">Three-column diagram for verifying inline image layout and text wrapping.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <g transform="translate(70 90)">
    <rect width="220" height="140" rx="24" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="32" y="62" fill="#0f172a" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Open</text>
    <text x="32" y="100" fill="#334155" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="20">Finder or Cmd+O</text>
  </g>
  <g transform="translate(370 90)">
    <rect width="220" height="140" rx="24" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="32" y="62" fill="#1d4ed8" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Parse</text>
    <text x="32" y="100" fill="#1e3a8a" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="20">Down-gfm to HTML</text>
  </g>
  <g transform="translate(670 90)">
    <rect width="220" height="140" rx="24" fill="#ccfbf1" stroke="#14b8a6"/>
    <text x="32" y="62" fill="#115e59" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Render</text>
    <text x="32" y="100" fill="#134e4a" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="20">WKWebView</text>
  </g>
  <path d="M290 160 H370" fill="none" stroke="#64748b" stroke-width="10" stroke-linecap="round"/>
  <path d="M590 160 H670" fill="none" stroke="#64748b" stroke-width="10" stroke-linecap="round"/>
  <path d="M330 340 C400 280 560 280 630 340" fill="none" stroke="#94a3b8" stroke-width="8" stroke-dasharray="14 12"/>
  <text x="275" y="418" fill="#334155" font-family="Menlo, Monaco, monospace" font-size="22">outline reuse + relative image base URL</text>
</svg>
